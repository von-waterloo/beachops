server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;
    # Docker embedded DNS — re-resolve api after container recreate (avoids sticky 502).
    resolver 127.0.0.11 valid=10s ipv6=off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https: wss:; img-src 'self' data: https://telegram.org https://*.telegram.org; style-src 'self' 'unsafe-inline'; script-src 'self' https://telegram.org https://oauth.telegram.org; frame-src https://oauth.telegram.org https://telegram.org; frame-ancestors https://web.telegram.org https://*.telegram.org;" always;

    location /api/voice/ws {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 7200s;
    }

    location /api/ {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /health {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
