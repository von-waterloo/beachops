name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package (dev)
        run: pip install -e ".[dev]"

      - name: Pytest
        env:
          TG_BOT_TOKEN: ci-dummy
          CURSOR_API_KEY: ci-dummy
          OPENAI_API_KEY: ci-dummy
        run: pytest --tb=short -q

  webapp:
    name: Webapp (lint / test / build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  compose:
    name: Docker Compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose file
        env:
          POSTGRES_PASSWORD: ci-compose-password
          DATA_ENCRYPTION_KEY: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          REPOSITORY_POLICY_JSON: '{"repositories":[]}'
        run: |
          touch .env .env.windows-worker
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.windows-worker.yml config --quiet
