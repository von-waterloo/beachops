x-json-logging: &json-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

name: beachops

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: tg_cursor_bot
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d tg_cursor_bot"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging: *json-logging

  redis:
    image: redis:alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    logging: *json-logging

  migrate:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://bot:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/tg_cursor_bot
      RUN_MIGRATIONS: "0"
    command: ["alembic", "upgrade", "head"]
    restart: "no"
    logging: *json-logging

  bot:
    build: .
    env_file: .env
    init: true
    stop_grace_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://bot:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/tg_cursor_bot
      REDIS_URL: redis://redis:6379/0
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY:?DATA_ENCRYPTION_KEY is required}
      REPOSITORY_POLICY_JSON: ${REPOSITORY_POLICY_JSON:?REPOSITORY_POLICY_JSON is required}
      WORKSPACE_PATH: /data/workspace
      RUN_MIGRATIONS: "0"
    volumes:
      - bot-data:/data
    restart: unless-stopped
    logging: *json-logging

  worker:
    build: .
    env_file: .env
    init: true
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://bot:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/tg_cursor_bot
      REDIS_URL: redis://redis:6379/0
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY:?DATA_ENCRYPTION_KEY is required}
      REPOSITORY_POLICY_JSON: ${REPOSITORY_POLICY_JSON:?REPOSITORY_POLICY_JSON is required}
      WORKSPACE_PATH: /data/workspace
      RUN_MIGRATIONS: "0"
    command: ["arq", "beachops.worker.WorkerSettings"]
    volumes:
      - bot-data:/data
    restart: unless-stopped
    logging: *json-logging

  api:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://bot:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/tg_cursor_bot
      REDIS_URL: redis://redis:6379/0
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY:?DATA_ENCRYPTION_KEY is required}
      REPOSITORY_POLICY_JSON: ${REPOSITORY_POLICY_JSON:?REPOSITORY_POLICY_JSON is required}
      WORKSPACE_PATH: /data/workspace
      RUN_MIGRATIONS: "0"
    command: ["beachops-api"]
    volumes:
      - bot-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging: *json-logging

  webapp:
    build: ./webapp
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped
    logging: *json-logging

volumes:
  postgres-data:
  redis-data:
  bot-data:
