services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-botsecret}
      POSTGRES_DB: tg_cursor_bot
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d tg_cursor_bot"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  bot:
    build: .
    env_file: .env
    init: true
    stop_grace_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://bot:${POSTGRES_PASSWORD:-botsecret}@postgres:5432/tg_cursor_bot
      WORKSPACE_PATH: /data/workspace
    volumes:
      - bot-data:/data
    restart: unless-stopped

volumes:
  postgres-data:
  bot-data:
